  # Live Streams
  /livestreams:
    get:
      operationId: getLivestreams
      tags: [livestreams]
      summary: List all live streams
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, live, ended]
      responses:
        "200":
          description: List of live streams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Livestream"
    post:
      operationId: createLivestream
      tags: [livestreams]
      summary: Schedule a live stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LivestreamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Livestream"

  /livestreams/{id}:
    patch:
      operationId: updateLivestream
      tags: [livestreams]
      summary: Update a live stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LivestreamUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Livestream"
    delete:
      operationId: deleteLivestream
      tags: [livestreams]
      summary: Delete a live stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Notifications
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: List all notifications
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Send a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth
    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminSession:
      type: object
      required: [username, isAuthenticated]
      properties:
        username:
          type: string
        isAuthenticated:
          type: boolean

    # Stats
    DashboardStats:
      type: object
      required: [totalStudents, totalTeachers, totalCourses, totalSubjects, totalAssistants, totalParents, activeStreams, recentReviews]
      properties:
        totalStudents:
          type: integer
        totalTeachers:
          type: integer
        totalCourses:
          type: integer
        totalSubjects:
          type: integer
        totalAssistants:
          type: integer
        totalParents:
          type: integer
        activeStreams:
          type: integer
        recentReviews:
          type: integer

    # Student
    Student:
      type: object
      required: [id, fullName, phone, gradeLevel, username, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        gradeLevel:
          type: string
        username:
          type: string
        parentName:
          type: ["string", "null"]
        parentPhone:
          type: ["string", "null"]
        isActive:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    StudentInput:
      type: object
      required: [fullName, phone, gradeLevel, username, password]
      properties:
        fullName:
          type: string
        phone:
          type: string
        gradeLevel:
          type: string
        username:
          type: string
        password:
          type: string
        parentName:
          type: string
        parentPhone:
          type: string
        notes:
          type: string

    StudentUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        gradeLevel:
          type: string
        username:
          type: string
        password:
          type: string
        parentName:
          type: string
        parentPhone:
          type: string
        isActive:
          type: boolean
        notes:
          type: string

    # Teacher
    Teacher:
      type: object
      required: [id, fullName, phone, username, bio, subjectIds, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarUrl:
          type: ["string", "null"]
        subjectIds:
          type: array
          items:
            type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TeacherInput:
      type: object
      required: [fullName, phone, username, password, bio, subjectIds]
      properties:
        fullName:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
        bio:
          type: string
        avatarUrl:
