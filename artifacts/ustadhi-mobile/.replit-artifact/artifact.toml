kind = "mobile"
previewPath = "/ustadhi-mobile/"
title = "منصة استاذي - تطبيق الموبايل"
version = "1.0.0"
id = "artifacts/ustadhi-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/ustadhi-mobile/" ]
localPort = 20313

[services.development]
run = "pnpm --filter @workspace/ustadhi-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ustadhi-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ustadhi-mobile", "run", "serve" ]

[services.env]
PORT = "20313"
BASE_PATH = "/ustadhi-mobile/"
