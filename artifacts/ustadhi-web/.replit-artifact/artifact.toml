kind = "web"
previewPath = "/"
title = "الرؤية الذهبية"
version = "1.0.0"
id = "artifacts/ustadhi-web"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23567

[services.development]
run = "pnpm --filter @workspace/ustadhi-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ustadhi-web", "run", "build" ]
serve = "static"
publicDir = "artifacts/ustadhi-web/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23567"
BASE_PATH = "/"
